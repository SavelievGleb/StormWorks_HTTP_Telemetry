<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    <script src="../../node_modules/plotly.js-dist/plotly.js"></script>
</head>

<body>
    <div id="statisticsPanel" class="container collapsed">
        <div class="panel">
            <div class="panel-header">Request</div>
            <div class="panel-content">
                <div class="value-block">
                    <span class="label">Count</span>
                    <span class="value" id="request-count">0</span>
                </div>
                <div class="value-block">
                    <span class="label">Frequency (Hz)</span>
                    <span class="value" id="request-frequency">0</span>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">Frames</div>
            <div class="panel-content">
                <div class="value-block">
                    <span class="label">Count</span>
                    <span class="value" id="frame-count">0</span>
                </div>
                <div class="value-block">
                    <span class="label">Frequency (Hz)</span>
                    <span class="value" id="frame-frequency">0</span>
                </div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">Processed</div>
            <div class="panel-content">
                <span class="value" id="write-count">0</span>
                <span class="label">/</span>
                <span class="value" id="processed-frames-count">0</span>
            </div>
        </div>
    </div>

    <div class="container" style="justify-content: left;">
        <button id="toggleInfoButton">Show Info</button>
        <button id="loadFileButton">Load file</button>
    </div>

    <div class="chart-container">
        <div id="chart" class="chart-panel"></div>
    </div>

    <script type="module" src="renderer.js"></script>
    <script type="module" src="chart-manager.js"></script>

    <script type="module">
        const toggleButton = document.getElementById('toggleInfoButton');
        const headerPanel = document.getElementById('statisticsPanel');
        let isCollapsed = true;

        toggleButton.addEventListener('click', () => {
            isCollapsed = !isCollapsed;

            if (isCollapsed) {
                headerPanel.classList.add('collapsed');
                toggleButton.textContent = 'Show Info';
                toggleButton.classList.add('collapsed-state');
            } else {
                headerPanel.classList.remove('collapsed');
                toggleButton.textContent = 'Hide Info';
                toggleButton.classList.remove('collapsed-state');
            }

            if (typeof Plotly !== 'undefined') {
                setTimeout(() => {
                    window.dispatchEvent(new Event('resize'));
                }, 300);
            }
        });
    </script>
</body>

</html>
